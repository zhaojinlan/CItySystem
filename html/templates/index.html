<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市知识图谱</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet" type="text/css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .search-bar {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .search-bar input {
            padding: 10px;
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
            font-size: 16px;
        }

        .search-bar button {
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-size: 16px;
        }

        #graph-container {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: white;
        }

        .node {
            cursor: pointer;
        }

        .info-panel {
            background-color: white;
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: 20px;
            display: none;
        }

         .qa-section {
            margin-top: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .qa-section h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        .qa-input {
            display: flex;
            margin-bottom: 15px;
        }

        .qa-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px 0 0 4px;
            font-size: 16px;
        }

        .qa-input button {
            padding: 10px 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-size: 16px;
        }

        .qa-answer {
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 4px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>城市知识图谱</h1>
    </header>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="city-search" placeholder="输入城市名称搜索...">
            <button id="search-btn">搜索</button>
        </div>

        <div id="graph-container"></div>

        <div id="info-panel" class="info-panel">
            <h3 id="node-label"></h3>
            <div id="node-details"></div>
        </div>
    </div>


   <div class="qa-section">
            <h2>问答系统</h2>
            <div class="qa-input">
                <input type="text" id="qa-input" placeholder="请输入你的问题，例如：长沙市的人口数量是多少？">
                <button id="qa-btn">提问</button>
            </div>
            <div class="qa-answer" id="qa-answer"></div>
        </div>
    </div>

    <script>
        // 初始化 Vis.js 图
        var container = document.getElementById('graph-container');
        var nodes = new vis.DataSet([]);
        var edges = new vis.DataSet([]);
        var network = null; // 用于存储网络图实例

        // 信息面板元素
        var infoPanel = document.getElementById('info-panel');
        var nodeLabel = document.getElementById('node-label');
        var nodeDetails = document.getElementById('node-details');

        // 获取图数据并更新图
        async function updateGraph(query = '') {
            try {
                const response = await fetch('/get_graph_data?city=' + encodeURIComponent(query));
                const data = await response.json();

                // 清空现有节点和边
                nodes.clear();
                edges.clear();

                // 添加新节点和边
                nodes.add(data.nodes);
                edges.add(data.edges);

                // 如果网络图未初始化，则初始化
                if (!network) {
                    network = new vis.Network(container, { nodes: nodes, edges: edges }, {
                        interaction: {
                            hover: true,
                            navigationButtons: true,
                            keyboard: true
                        },
                        physics: {
                            enabled: true,
                            stabilization: {
                                enabled: true,
                                iterations: 500
                            }
                        },
                        groups: {
                            '城市': {
                                shape: 'icon',
                                icon: {
                                    face: 'FontAwesome',
                                    code: '\uf1fa', // 城市图标
                                    size: 40,
                                    color: '#2196F3'
                                },
                                color: '#2196F3'
                            },
                            '行政级别': {
                                shape: 'database',
                                color: '#9C27B0'
                            },
                            '省份': {
                                shape: 'box',
                                color: '#FF9800'
                            }
                        }
                    });
                } else {
                    // 更新数据后重新稳定布局
                    network.setData({ nodes: nodes, edges: edges });
                    network.stabilize();
                }

                // 初始化或重新绑定点击事件
                initNetworkEvents();

                // 如果没有查询到节点，显示提示信息
                if (data.nodes.length === 0) {
                    alert('未找到相关城市信息');
                }

                // 如果有查询结果，聚焦第一个节点
                if (data.nodes.length > 0 && query) {
                    network.focus([data.nodes[0].id], {
                        scale: 1.5,
                        animation: true
                    });
                }
            } catch (error) {
                console.error('Error fetching graph data:', error);
            }
        }

        // 网络节点点击事件
        function initNetworkEvents() {
            if (network) {
                network.off('click'); // 移除之前的点击事件
                network.on('click', function(properties) {
                    if (properties.nodes.length > 0) {
                        var nodeId = properties.nodes[0];
                        var node = nodes.get(nodeId);

                        // 显示信息面板
                        nodeLabel.textContent = node.label;
                        nodeDetails.innerHTML = renderNodeDetails(node.title);
                        infoPanel.style.display = 'block';

                        // 聚焦点击的节点
                        network.focus([nodeId], {
                            scale: 1.5,
                            animation: true
                        });
                    }
                });
            }
        }

        // 渲染节点详情
        function renderNodeDetails(title) {
            // 清理 HTML 标签，只保留文本
            var cleanedTitle = title.replace(/<br>/g, '<br>');
            return cleanedTitle;
        }

        // 搜索功能
        document.getElementById('search-btn').addEventListener('click', function() {
            var query = document.getElementById('city-search').value.trim();
            updateGraph(query);
        });

        // 按 Enter 键搜索
        document.getElementById('city-search').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                updateGraph(e.target.value.trim());
            }
        });

        // 初始加载图谱
        updateGraph();

        // 窗口大小改变时调整图容器大小
        window.addEventListener('resize', function() {
            if (network) {
                network.redraw();
            }
        });

           // 问答系统功能
        document.getElementById('qa-btn').addEventListener('click', function() {
            var question = document.getElementById('qa-input').value.trim();
            if (question) {
                fetch('/qa?question=' + encodeURIComponent(question))
                    .then(response => response.json())
                    .then(data => {
                        var answerDiv = document.getElementById('qa-answer');
                        answerDiv.innerHTML = data.answer;
                        answerDiv.style.display = 'block';
                    })
                    .catch(error => {
                        console.error('Error fetching QA response:', error);
                        alert('问答系统出错，请重试。');
                    });
            }
        });

        // 按 Enter 键提问
        document.getElementById('qa-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('qa-btn').click();
            }
        });

    </script>
</body>
</html>
